<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Job Application Form</title>
</head>
<body>

  <h1>Job Application Form</h1>

  <form method="POST">

    <label for="name">Name</label>
    <input type="text" id="name" required>
    <br><br>

    <label for="email">Email</label>
    <input type="email" id="email" required>
    <br><br>

    <label>Gender</label><br>
    <input type="radio" id="gender_m" name="gender" value="male" required>
    <label for="gender_m">Male</label>
    <input type="radio" id="gender_f" name="gender" value="female">
    <label for="gender_f">Female</label>
    <br><br>

    <label for="laptop">Laptop Brands</label><br>
    <select id="laptop">
      <option value="">--Select Laptop Brand--</option>
      <option value="apple">Apple</option>
      <option value="asus">Asus</option>
      <option value="hp">HP</option>
    </select>
    <br><br>

    <label for="age">Age</label>
    <input type="number" id="age" required>
    <br><br>

    <label for="dob">Date of Birth</label>
    <input type="date" id="dob" required>
    <br><br>

    <label for="password">Password</label>
    <input type="password" id="password" required>
    <br><br>

    <label for="portfolio">Portfolio URL</label>
    <input type="url" id="portfolio">
    <br><br>

    <button type="submit">Submit</button>

  </form>

</body>
</html>
